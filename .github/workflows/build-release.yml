name: Build Native Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        required: false
        default: 'true'
      build_macos:
        description: 'Build macOS'
        required: false
        default: 'true'
      build_linux:
        description: 'Build Linux'
        required: false
        default: 'true'
      draft_release:
        description: 'Create as draft'
        required: false
        default: 'false'

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Xmx2048m

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      build_windows: ${{ steps.matrix.outputs.build_windows }}
      build_macos: ${{ steps.matrix.outputs.build_macos }}
      build_linux: ${{ steps.matrix.outputs.build_linux }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: version
        run: |
          if [[ $GITHUB_REF =~ refs/tags/v(.+) ]]; then
            RELEASE_VERSION="${BASH_REMATCH[1]}"
            # jpackage --app-version only accepts dotted numeric versions (e.g. 1.0.5),
            # so strip any pre-release/build suffix like "-beta1" if present.
            APP_VERSION=$(echo "$RELEASE_VERSION" | sed -E 's/[-+].*$//')
          else
            RELEASE_VERSION="1.0.0-dev-${GITHUB_SHA:0:7}"
            APP_VERSION="1.0.0"
          fi
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "📌 Release version: $RELEASE_VERSION (jpackage app version: $APP_VERSION)"

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Set Build Matrix
        id: matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_WINDOWS="${{ github.event.inputs.build_windows }}"
            BUILD_MACOS="${{ github.event.inputs.build_macos }}"
            BUILD_LINUX="${{ github.event.inputs.build_linux }}"
          else
            BUILD_WINDOWS="true"
            BUILD_MACOS="true"
            BUILD_LINUX="true"
          fi

          echo "build_windows=$BUILD_WINDOWS" >> $GITHUB_OUTPUT
          echo "build_macos=$BUILD_MACOS" >> $GITHUB_OUTPUT
          echo "build_linux=$BUILD_LINUX" >> $GITHUB_OUTPUT

      - name: Validation Summary
        run: |
          echo "════════════════════════════════════════════"
          echo "✅ Repository Validation Successful"
          echo "════════════════════════════════════════════"
          echo "Release version: ${{ steps.version.outputs.release_version }}"
          echo "jpackage app version: ${{ steps.version.outputs.app_version }}"
          echo "Windows Build: ${{ steps.matrix.outputs.build_windows }}"
          echo "macOS Build: ${{ steps.matrix.outputs.build_macos }}"
          echo "Linux Build: ${{ steps.matrix.outputs.build_linux }}"
          echo "════════════════════════════════════════════"

  build:
    name: 📦 Build (${{ matrix.display_name }})
    needs: validate
    runs-on: ${{ matrix.os }}
    if: |
      (matrix.platform == 'windows' && needs.validate.outputs.build_windows == 'true') ||
      (matrix.platform == 'linux'   && needs.validate.outputs.build_linux   == 'true') ||
      (matrix.platform == 'macos'   && needs.validate.outputs.build_macos   == 'true')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            display_name: Windows (MSI)
            artifact_name: AlarmClock-Windows
            artifact_glob: app/build/jpackage/*.msi

          - os: ubuntu-latest
            platform: linux
            display_name: Linux (DEB)
            artifact_name: AlarmClock-Linux
            artifact_glob: app/build/jpackage/*.deb

          - os: macos-latest
            platform: macos
            display_name: macOS (DMG)
            artifact_name: AlarmClock-macOS
            artifact_glob: app/build/jpackage/*.dmg

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        if: matrix.platform != 'windows'
        run: chmod +x gradlew

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils

      - name: Run Tests
        if: matrix.platform != 'windows'
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Run Tests (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: .\gradlew.bat test --no-daemon
        continue-on-error: true

      - name: Build Native Installer
        if: matrix.platform != 'windows'
        run: ./gradlew jpackage --no-daemon "-PappVersion=${{ needs.validate.outputs.app_version }}"

      - name: Build Native Installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: .\gradlew.bat jpackage --no-daemon "-PappVersion=${{ needs.validate.outputs.app_version }}"

      - name: List jpackage output (debug)
        shell: bash
        run: ls -la app/build/jpackage/ || true

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: error

  create-release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-files
          find release-artifacts -type f -exec mv {} release-files/ \;
          ls -la release-files

      - name: Generate Release Notes
        run: |
          cat > RELEASE_NOTES.md << EOF
          # Alarm Clock v${{ needs.validate.outputs.release_version }}

          ## 📥 Downloads

          ### 🪟 Windows
          - \`.msi\` installer — Requirements: Windows 10+ (Java 21 runtime bundled)

          ### 🍎 macOS
          - \`.dmg\` installer — Requirements: macOS 10.15+ (Java 21 runtime bundled)

          ### 🐧 Linux
          - \`.deb\` package — Requirements: Ubuntu 20.04+ / Debian-based distro

          \`\`\`bash
          sudo dpkg -i AlarmClock_*.deb
          \`\`\`

          ## ✨ Features
          - 🕐 Live Digital Clock
          - ⏰ Multiple Alarms
          - 🔔 Audio Alerts
          - 😴 Snooze Support
          - 🔁 Repeat Alarms
          - 💾 Persistent Storage
          - 🖥️ Modern JavaFX UI

          ## 🐛 Troubleshooting

          ### Application won't start
          - Ensure Windows 10+, macOS 10.15+, or Ubuntu 20.04+
          - Java 21 is bundled, no separate installation needed

          ### No sound
          - Check system audio settings
          - Ensure speakers are not muted

          ---

          **Built with Java 21 + JavaFX 21 + Gradle**
          EOF

          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: RELEASE_NOTES.md
          draft: ${{ github.event.inputs.draft_release || 'false' }}
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "✅ ALL PLATFORMS BUILT AND RELEASED SUCCESSFULLY!"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📌 Release Information:"
          echo "   Version: ${{ needs.validate.outputs.release_version }}"
          echo "   Repository: ${{ github.repository }}"
          echo "   Release URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "════════════════════════════════════════════════════════════"
