name: Build & Release

on:
  push:
    tags:
      - 'v*'           # triggers on v1.0.0, v1.2.3, etc.

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact-pattern: 'app/build/dist/*.exe'

          - os: macos-latest
            label: macOS
            artifact-pattern: 'app/build/dist/*.dmg'

          - os: ubuntu-latest
            label: Linux
            artifact-pattern: 'app/build/dist/*.deb'

    runs-on: ${{ matrix.os }}
    name: Build – ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :app:jpackage --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clock-${{ matrix.label }}
          path: ${{ matrix.artifact-pattern }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # crucial permission needed to attach files to releases

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clock ${{ github.ref_name }}
          body: |
            ## Clock ${{ github.ref_name }}
            Download the standalone native installer for your platform below.
          files: installers/* # Tells GitHub to grab the built files and attach them here
          draft: false
          prerelease: false
