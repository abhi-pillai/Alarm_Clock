name: Build Native Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: AlarmClock-Windows
            installer_glob: app/build/jpackage/*.msi
          - os: ubuntu-latest
            artifact_name: AlarmClock-Linux
            installer_glob: app/build/jpackage/*.deb
          - os: macos-latest
            artifact_name: AlarmClock-macOS
            installer_glob: app/build/jpackage/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install WiX (Windows only)
        if: matrix.os == 'windows-latest'
        run: dotnet tool install --global wix

      - name: Install fakeroot (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Grant execute permission for gradlew (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew jpackage --no-daemon
        shell: bash

      - name: List jpackage output (debug)
        run: find app/build/jpackage -type f
        shell: bash

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact folders
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.dmg" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          