

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    implementation 'com.googlecode.soundlibs:mp3spi:1.9.5.4'   // MP3 → Java Sound bridge
    implementation 'com.googlecode.soundlibs:tritonus-share:0.3.7.4' // required by mp3spi
    implementation 'com.googlecode.soundlibs:jlayer:1.0.1.4'   // MP3 decoder engine


    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
// JavaFX configuration 
javafx {
    version = "21"

    modules = [
        'javafx.controls',   // Buttons, Labels, TextFields, etc.
        'javafx.fxml',       // FXML layout files (like XML for UI)
        'javafx.media',      // Audio playback (for alarm sound)
        'javafx.base'        // Core JavaFX classes (included by others, but explicit is safe)
    ]
}
application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}
test {
    useJUnitPlatform()
}